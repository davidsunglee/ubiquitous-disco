<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bell Brawl — Local Feel Sandbox</title>
    <style>
      /*
       * The rotate-device prompt's visibility is controlled by the JS
       * OrientationOverlay (it sets the element's inline `visibility` on mount
       * and on every resize/orientationchange). This rule only adds a
       * visual cue — de-emphasising the canvas while in portrait.
       */
      @media (orientation: portrait) {
        #game-container canvas {
          opacity: 0.2;
        }
      }

      html,
      body {
        height: 100%;
      }
      /* Fill the viewport so Phaser's Scale.FIT has the whole window to scale
         the 960x540 canvas into (centered, aspect-preserved). */
      #game-container {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
    </style>
  </head>
  <body style="margin:0;background:#1a1a1a">
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
